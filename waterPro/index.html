<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Realistic Ocean — Three.js</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌊%3C/text%3E%3C/svg%3E"
    />
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; width: 100%; height: 100%; }

      /* Loading / boot screen */
      #boot {
        position: fixed; inset: 0; z-index: 20;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 22px;
        background: radial-gradient(120% 120% at 50% 0%, #0b2a3a 0%, #041019 55%, #01060b 100%);
        color: #cfe9f5;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        transition: opacity 1.1s ease;
      }
      #boot h1 { font-weight: 300; letter-spacing: 0.35em; font-size: 15px; text-transform: uppercase; opacity: 0.85; }
      #boot .bar { width: 240px; height: 2px; background: rgba(255,255,255,0.12); border-radius: 2px; overflow: hidden; }
      #boot .bar > i { display: block; height: 100%; width: 30%; background: linear-gradient(90deg, #38b6ff, #9be7ff); border-radius: 2px; animation: slide 1.2s ease-in-out infinite; }
      #boot small { opacity: 0.4; font-size: 11px; letter-spacing: 0.15em; }
      @keyframes slide { 0% { transform: translateX(-120%);} 100% { transform: translateX(420%);} }
      #boot.hidden { opacity: 0; pointer-events: none; }

      /* On-screen hint / HUD */
      #hint {
        position: fixed; left: 0; right: 0; bottom: 18px; z-index: 10;
        text-align: center; pointer-events: none;
        color: rgba(230,245,255,0.72);
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
        text-shadow: 0 1px 6px rgba(0,0,0,0.6);
        transition: opacity 0.6s ease;
      }
      #hint b { color: #9be7ff; font-weight: 600; }

      /* Depth indicator */
      #depth {
        position: fixed; top: 16px; left: 16px; z-index: 10;
        color: rgba(230,245,255,0.85);
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        font-size: 12px; letter-spacing: 0.06em;
        padding: 8px 12px; border-radius: 10px;
        background: rgba(4,20,32,0.35); backdrop-filter: blur(8px);
        border: 1px solid rgba(150,220,255,0.14);
        text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        min-width: 132px;
      }
      #depth .k { opacity: 0.5; }
      #depth .v { color: #9be7ff; }

      /* ---- Menu (lil-gui) — cinematic glass theme ---- */
      .lil-gui {
        --background-color: rgba(9, 20, 30, 0.55);
        --text-color: #cfe6f2;
        --title-background-color: rgba(6, 15, 23, 0.0);
        --title-text-color: #eaf7fd;
        --widget-color: rgba(160, 220, 255, 0.10);
        --hover-color: rgba(120, 220, 255, 0.18);
        --focus-color: rgba(120, 220, 255, 0.30);
        --number-color: #7fe3ff;
        --string-color: #9be7ff;
        --slider-knob-color: #4fd3ff;
        --slider-input-color: rgba(120, 220, 255, 0.22);
        --font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        --font-family-mono: ui-monospace, Menlo, Consolas, monospace;
        --font-size: 12px;
        --input-font-size: 12px;
        --widget-height: 24px;
        --padding: 9px;
        --spacing: 6px;
        --widget-border-radius: 7px;
        --name-width: 46%;
      }
      .lil-gui.root {
        top: 16px; right: 16px;
        width: 296px;
        border-radius: 14px;
        border: 1px solid rgba(150, 220, 255, 0.16);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.06);
        background: linear-gradient(180deg, rgba(14, 32, 46, 0.62), rgba(7, 17, 26, 0.62));
        backdrop-filter: blur(16px) saturate(1.25);
        -webkit-backdrop-filter: blur(16px) saturate(1.25);
        overflow: hidden;
      }
      /* main title bar */
      .lil-gui.root > .title {
        font-weight: 600; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
        padding: 12px 12px;
        color: #eaf7fd;
        background: linear-gradient(90deg, rgba(79, 211, 255, 0.20), rgba(79, 211, 255, 0.02));
        border-bottom: 1px solid rgba(150, 220, 255, 0.14);
      }
      .lil-gui.root > .title::before { content: "🌊 "; }
      /* folder titles */
      .lil-gui .title {
        font-weight: 600; letter-spacing: 0.05em; color: #bfe6f5;
        transition: background 0.14s ease, color 0.14s ease;
      }
      .lil-gui .title:hover { background: var(--hover-color); color: #eaf7fd; }
      .lil-gui .children { padding-bottom: 2px; }
      .lil-gui .controller { transition: background 0.12s ease; border-radius: 6px; }
      .lil-gui .controller:hover { background: rgba(160, 220, 255, 0.05); }
      .lil-gui .controller .name { opacity: 0.9; }
      /* buttons */
      .lil-gui .controller.function .widget button,
      .lil-gui .controller.function .name {
        color: #a9ecff; font-weight: 600; letter-spacing: 0.02em;
      }
      .lil-gui .controller.function:hover .name { color: #e2f7ff; }
      /* slider fill accent */
      .lil-gui .slider { border-radius: 6px; overflow: hidden; }
      .lil-gui .slider .fill { background: linear-gradient(90deg, #1f8fd0, #4fd3ff); }
      /* dropdown */
      .lil-gui .controller.option .widget select { border-radius: 6px; font-weight: 600; }
      /* scrollbar */
      .lil-gui .children::-webkit-scrollbar { width: 8px; }
      .lil-gui .children::-webkit-scrollbar-thumb { background: rgba(120,220,255,0.22); border-radius: 8px; }
      @media (max-width: 640px) { .lil-gui.root { width: 240px; } }
    </style>
    <script type="module" crossorigin src="./assets/index-D7xk00-F.js"></script>
  </head>
  <body>
    <div id="app"></div>

    <div id="depth" hidden>
      <div><span class="k">STATE</span> &nbsp;<span class="v" id="depth-state">ABOVE</span></div>
      <div><span class="k">DEPTH</span> &nbsp;<span class="v" id="depth-val">0.0 m</span></div>
    </div>

    <div id="hint"><b>Double-click</b> water to drop objects &nbsp;·&nbsp; <b>Drag</b> them around &nbsp;·&nbsp; Scroll to zoom &nbsp;·&nbsp; Dive <b>below</b></div>

    <div id="boot">
      <h1>Ocean</h1>
      <div class="bar"><i></i></div>
      <small>compiling shaders</small>
    </div>

  </body>
</html>
